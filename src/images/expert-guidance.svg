<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="100%" height="100%">
  <style>
    .stroke-main { stroke: #171717; }
    .stroke-secondary { stroke: #D4D4D4; }
    .fill-base { fill: #FFFFFF; stroke: #E5E5E5; }
    .accent-bg { fill: #EFF6FF; stroke: #BFDBFE; }
    .accent-fg { fill: #3B82F6; }
    
    @media (prefers-color-scheme: dark) {
      .stroke-main { stroke: #F5F5F5; }
      .stroke-secondary { stroke: #404040; }
      .fill-base { fill: #0A0A0A; stroke: #262626; }
      .accent-bg { fill: #172554; stroke: #1E3A8A; }
      .accent-fg { fill: #60A5FA; }
    }
  </style>
  
  <g transform="translate(10, 20)">
    <!-- Connection Lines -->
    <path d="M 80 35 C 130 35, 130 60, 160 60" fill="none" class="stroke-secondary" stroke-width="1.5" />
    <path d="M 80 60 L 160 60" fill="none" class="stroke-secondary" stroke-width="1.5" />
    <path d="M 80 85 C 130 85, 130 60, 160 60" fill="none" class="stroke-secondary" stroke-width="1.5" />
    
    <path d="M 192 60 L 230 60" fill="none" class="stroke-main" stroke-width="1.5" stroke-dasharray="3 3" />
    
    <!-- Left Nodes: Precedent Cases -->
    <rect x="40" y="23" width="40" height="24" rx="4" class="fill-base" stroke-width="1.5" />
    <path d="M 48 31 L 64 31 M 48 37 L 72 37" class="stroke-secondary" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    
    <rect x="40" y="48" width="40" height="24" rx="4" class="fill-base" stroke-width="1.5" />
    <path d="M 48 56 L 72 56 M 48 62 L 60 62" class="stroke-secondary" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    
    <rect x="40" y="73" width="40" height="24" rx="4" class="fill-base" stroke-width="1.5" />
    <path d="M 48 81 L 60 81 M 48 87 L 68 87" class="stroke-secondary" stroke-width="1.5" stroke-linecap="round" fill="none"/>

    <!-- Center Node: AI/Logic -->
    <rect x="160" y="44" width="32" height="32" rx="8" class="accent-bg" stroke-width="1.5" />
    <path d="M 176 53 L 176 67 M 169 60 L 183 60" class="accent-fg" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <circle cx="176" cy="60" r="3" class="accent-fg" />
    
    <!-- Right Node: Good Execution -->
    <rect x="230" y="44" width="32" height="32" rx="8" class="fill-base" stroke-width="1.5" />
    <path d="M 238 60 L 243 65 L 253 54" fill="none" class="stroke-main" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>