              vec3 edgeGlow = vec3(1.0) * edgeFactor * edgeBrightness;
              float rim = fresnel(viewDir, normal);
              vec3 iridColor = iridescenceShimmer(viewDir, normal);
              vec3 iridContribution = iridColor * iridescence * rim * edgeFactor;
              vec3 metallicEffects = crystalColor + specularColor + edgeGlow + iridContribution;
              gl_FragColor = vec4(mix(terrainColor, metallicEffects, opacity), 1.0);
            }`,
        transparent: false,
        side: THREE.DoubleSide,
        depthWrite: true,
        depthTest: true
      });
      const metallicMesh = new THREE.Mesh(geometry, metallicMaterial);
      metallicMesh.position.y = 0.01;
      metallicMesh.renderOrder = 999;
      metallicMesh.frustumCulled = false;
      scene.add(metallicMesh);
      frameCallbacks.push(() => {
        metallicMaterial.uniforms.u_cameraPos.value.copy(camera.position);
      });
    }

    // --- Point cloud ---
    // Point cloud not active

    // --- Contour lines (generated client-side from heightmap via D3) ---
    {
      const CC = STATE.contours;
      const side = T.segments + 1;
      const useTerrain = CC.colorMode === 'terrain';
      const solidColor = new THREE.Color(CC.color);
      const resolution = new THREE.Vector2(window.innerWidth, window.innerHeight);

      // Build height grid for d3.contours — decode from the PNG pixels
      const heightGrid = new Float32Array(side * side);
      for (let i = 0; i < side * side; i++) {
        const pIdx = i * 4;
        const normalized = (hPixels[pIdx] * 256 + hPixels[pIdx + 1]) / 65535;
        heightGrid[i] = normalized * (T.maxHeight - T.minHeight) + T.minHeight;
      }

      // Bilinear height sampling
      function sampleHeight(worldX, worldZ) {
        const gx = ((worldX + T.size * 0.5) / T.size) * T.segments;
        const gz = ((worldZ + T.size * 0.5) / T.size) * T.segments;
        const x0 = Math.floor(gx), z0 = Math.floor(gz);
        const x1 = Math.min(x0 + 1, T.segments), z1 = Math.min(z0 + 1, T.segments);
        const fx = gx - x0, fz = gz - z0;
        const h00 = heightGrid[z0 * side + x0], h10 = heightGrid[z0 * side + x1];
        const h01 = heightGrid[z1 * side + x0], h11 = heightGrid[z1 * side + x1];
        return (h00 + (h10 - h00) * fx) + ((h01 + (h11 - h01) * fx) - (h00 + (h10 - h00) * fx)) * fz;
      }

      // Color sampling from color texture canvas (if terrain-colored)
      let colorPixels = null;
      let colorSide = 0;
      if (useTerrain && COLOR_TEX_URL) {
        const cImg = await loadImage(COLOR_TEX_URL);
        const cCanvas = document.createElement('canvas');
        cCanvas.width = cImg.width; cCanvas.height = cImg.height;
        const cCtx = cCanvas.getContext('2d');
        cCtx.drawImage(cImg, 0, 0);
        colorPixels = cCtx.getImageData(0, 0, cImg.width, cImg.height).data;
        colorSide = cImg.width;
      }
      function sampleColor(worldX, worldZ) {
        if (!colorPixels) return { r: 1, g: 1, b: 1 };
        const u = (worldX + T.size * 0.5) / T.size;
        const v = (worldZ + T.size * 0.5) / T.size;
        const px = Math.max(0, Math.min(colorSide - 1, Math.round(u * (colorSide - 1))));
        const py = Math.max(0, Math.min(colorSide - 1, Math.round(v * (colorSide - 1))));
        const idx = (py * colorSide + px) * 4;
        return { r: colorPixels[idx] / 255, g: colorPixels[idx + 1] / 255, b: colorPixels[idx + 2] / 255 };
      }

      // Compute thresholds
      const thresholds = [];
      if (CC.shoreLines) thresholds.push(T.minHeight + 0.001);
      for (let v = Math.ceil(T.minHeight / CC.interval) * CC.interval; v < T.maxHeight; v += CC.interval) {
        thresholds.push(v);
      }
      if (CC.shoreLines) thresholds.push(T.maxHeight - 0.001);

      // Clipping bounds
      const cl = STATE.clipping;
      const halfSize = T.size * 0.5;
      const clipBounds = {
        north: halfSize - cl.north * T.size,
        south: -halfSize + cl.south * T.size,
        east: halfSize - cl.east * T.size,
        west: -halfSize + cl.west * T.size
      };
      const isInBounds = (x, z) =>
        x >= clipBounds.west && x <= clipBounds.east &&
        z >= clipBounds.south && z <= clipBounds.north;

      // Generate contours
      const contours = d3.contours()
        .size([side, side])
        .thresholds(thresholds)(heightGrid);
      const yOffset = 0.02;

      function addLine(positions, colors) {
        if (positions.length < 6) return;
        const lineGeom = new LineGeometry();
        lineGeom.setPositions(positions);
        let mat;
        if (useTerrain && colors.length > 0) {
          lineGeom.setColors(colors);
          mat = new LineMaterial({ vertexColors: true, opacity: CC.opacity, transparent: true, linewidth: CC.lineWidth, alphaToCoverage: false });
        } else {
          mat = new LineMaterial({ color: solidColor, opacity: CC.opacity, transparent: true, linewidth: CC.lineWidth, alphaToCoverage: false });
        }
        mat.resolution.copy(resolution);
        const line = new Line2(lineGeom, mat);
        line.computeLineDistances();
        scene.add(line);
      }

      contours.forEach(contour => {
        contour.coordinates.forEach(polygon => {
          polygon.forEach(ring => {
            if (ring.length < 2) return;
            let curPos = [], curCol = [];
            ring.forEach(([gx, gz]) => {
              const wx = (gx / T.segments - 0.5) * T.size;
              const wz = (gz / T.segments - 0.5) * T.size;
              if (isInBounds(wx, wz)) {
                curPos.push(wx, sampleHeight(wx, wz) + yOffset, wz);
                if (useTerrain) { const c = sampleColor(wx, wz); curCol.push(c.r, c.g, c.b); }
              } else if (curPos.length >= 6) {
                addLine(curPos, curCol);
                curPos = []; curCol = [];
              } else {
                curPos = []; curCol = [];
              }
            });
            if (curPos.length >= 6) addLine(curPos, curCol);
          });
        });
      });

      // Boundary lines along clipped edges
      const numSamples = Math.min(T.segments, 256);
      function addBoundary(samples) {
        if (samples.length < 2) return;
        const positions = [], colors = [];
        samples.forEach(([x, z]) => {
          positions.push(x, sampleHeight(x, z) + yOffset, z);
          if (useTerrain) { const c = sampleColor(x, z); colors.push(c.r, c.g, c.b); }
        });
        addLine(positions, colors);
      }
      if (cl.north > 0) { const s = []; for (let i = 0; i <= numSamples; i++) { const t = i/numSamples; s.push([clipBounds.west + t*(clipBounds.east-clipBounds.west), clipBounds.north]); } addBoundary(s); }
      if (cl.south > 0) { const s = []; for (let i = 0; i <= numSamples; i++) { const t = i/numSamples; s.push([clipBounds.west + t*(clipBounds.east-clipBounds.west), clipBounds.south]); } addBoundary(s); }
      if (cl.east > 0) { const s = []; for (let i = 0; i <= numSamples; i++) { const t = i/numSamples; s.push([clipBounds.east, clipBounds.south + t*(clipBounds.north-clipBounds.south)]); } addBoundary(s); }
      if (cl.west > 0) { const s = []; for (let i = 0; i <= numSamples; i++) { const t = i/numSamples; s.push([clipBounds.west, clipBounds.south + t*(clipBounds.north-clipBounds.south)]); } addBoundary(s); }

      window.addEventListener('resize', () => {
        const res = new THREE.Vector2(window.innerWidth, window.innerHeight);
        scene.traverse(obj => {
          if (obj.material && obj.material.isLineMaterial) {
            obj.material.resolution.copy(res);
          }
        });
      });
    }

    // --- Render loop ---
    function render() {
      requestAnimationFrame(render);
      controls.update();
      for (const cb of frameCallbacks) cb();
      renderer.render(scene, camera);
    }

    // --- Resize ---
    window.addEventListener('resize', () => {
      const w = window.innerWidth;
      const h = window.innerHeight;
      renderer.setSize(w, h);
      if (camera.isOrthographicCamera) {
        const hh = (camera.top - camera.bottom) * 0.5;
        const hw = hh * (w / h);
        camera.left = -hw;
        camera.right = hw;
      } else {
        camera.aspect = w / h;
      }
      camera.updateProjectionMatrix();
    });

    render();
  </script>
</body>
</html>
